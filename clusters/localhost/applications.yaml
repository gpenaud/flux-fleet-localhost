---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-configurations
  interval: 5m
  retryInterval: 30s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./applications/localhost
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age-private-key
  wait: true
  timeout: 5m
