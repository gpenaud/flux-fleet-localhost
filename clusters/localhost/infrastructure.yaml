---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-secrets
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/secrets
  decryption:
    provider: sops
    secretRef:
      name: sops-age-private-key
  prune: true
  wait: true

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-secrets
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/controllers/localhost
  prune: true
  wait: true

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configurations
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-controllers
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/configurations/localhost
  prune: true
  wait: true
  patches:
    - target:
        kind: Certificate
        name: traefik-dashboard
      patch: |
        - op: replace
          path: /spec/dnsNames/0
          value: traefik.gpenaud.localhost   
    - target:
        kind: IngressRoute
        name: traefik-dashboard
      patch: |
        - op: replace
          path: /spec/routes/0/match
          value: traefik.gpenaud.localhost
        