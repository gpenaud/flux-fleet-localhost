---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: ExternalArtifact
    name: infrastructure-controllers
  path: ./localhost
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age-private-key
  wait: true

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-controllers
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: ExternalArtifact
    name: infrastructure-configs
  path: ./localhost
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age-private-key
  patches:
    - target:
        kind: Certificate
        name: traefik-dashboard
      patch: |
        - op: replace
          path: /spec/dnsNames/0
          value: traefik.gpenaud.localhost   
    - target:
        kind: IngressRoute
        name: traefik-dashboard
      patch: |
        - op: replace
          path: /spec/routes/0/match
          value: traefik.gpenaud.localhost
        