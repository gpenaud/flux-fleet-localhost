---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: le-portail-ecolieu
resources:
  - ../../base/wordpress/
  - secrets.enc.yaml
  - backup-pod-config.yaml
patches:
  - path: values.yaml
    target:
      kind: HelmRelease
      name: le-portail
    patch: |
      - op: replace 
        path: /spec/update/path
        value: ./applications/le-portail/localhost
  - target:
      kind: Namespace
      name: le-portail-wordpress
    patch: |
      - op: replace
        path: /metadata/name
        value: le-portail-ecolieu
  - target: 
      kind: Schedule
      name: le-portail
    patch: |
      - op: replace
        path: /metadata/name
        value:
          name: ecolieu
      - op: add
        path: /spec
        value:
          podConfigRef:
            name: ecolieu