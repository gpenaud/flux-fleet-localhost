apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: le-portail-ecolieu
spec:
  values:
    wordpressUsername: ""
    wordpressPassword: ""
    wordpressEmail: dugrainamoudre@gmail.com
    mariadb:
      enabled: true
      auth:
        existingSecret: ecolieu-mariadb
    externalDatabase:
      host: wordpress-mariadb-0.le-portail-ecolieu.svc.cluster.local
      port: 3306
      user: le-portail
      database: le-portail
      existingSecret: ecolieu-wordpress
      existingSecretPasswordKey: WORDPRESS_DATABASE_PASSWORD
    wordpressPlugins: []
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: traefik
      hostname: le-portail.gpenaud.localhost
      annotations:
        kubernetes.io/ingress.class: traefik
        cert-manager.io/cluster-issuer: mkcert
      extraTls:
        - hosts:
            - le-portail.gpenaud.localhost
          secretName: le-portail.gpenaud.localhost-tls
  valuesFrom:
    - kind: Secret
      name: ecolieu
      valuesKey: WORDPRESS_USERNAME
      targetPath: wordpressUsername
    - kind: Secret
      name: ecolieu
      valuesKey: WORDPRESS_PASSWORD
      targetPath: wordpressPassword
