apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications-le-portail
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./applications/le-portail/localhost
  prune: true
  createNamespace: true
  dependsOn:
    - name: tenants
  decryption:
    provider: sops
    secretRef:
      name: sops-age-private-key
  postBuild:
    substitute:
      TENANT: le-portail