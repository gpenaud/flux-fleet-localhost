---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami
spec:
  type: oci
  url: oci://registry-1.docker.io/bitnamicharts
  interval: 24h

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wordpress
spec:
  releaseName: wordpress
  chart:
    spec:
      chart: wordpress
      version: "28.1.7"
      sourceRef:
        kind: HelmRepository
        name: bitnami
  interval: 5m
  timeout: 1m
  install:
    remediation:
      retries: 3