---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: wordpress
spec:
  interval: 5m
  url: https://charts.bitnami.com/bitnami

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wordpress
spec:
  releaseName: wordpress
  chart:
    spec:
      chart: wordpress
      version: "28.1.7"
      sourceRef:
        kind: HelmRepository
        name: wordpress
  interval: 5m
  timeout: 1m
  install:
    remediation:
      retries: 3