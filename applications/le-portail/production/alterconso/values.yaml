apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alterconso
spec:
  values:
    webapp:
      image:
        version: 1.0.6 # {"$imagepolicy": "alterconso:alterconso:tag"}
      ingress:
        annotations:
          cert-manager.io/cluster-issuer: "mkcert-issuer"
        hosts:
          - name: alterconso.gpenaud.localhost
            path: /
            tls: true
      vhost: alterconso.gpenaud.localhost
    database:
      annotations:
        k8up.io/backupcommand: mysqldump --hex-blob --no-tablespaces -u ${MYSQL_USER} -p${MYSQL_PASSWORD} ${MYSQL_DATABASE}
        k8up.io/file-extension: .sql
      persistentVolume:
        backup: true
        local:
          path: /mnt/k3s/alterconso
        nodeAffinity:
          required:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - work
  valuesFrom:
    - kind: Secret
      name: alterconso
      valuesKey: MYSQL_DATABASE
      targetPath: mysql.database
    - kind: Secret
      name: alterconso
      valuesKey: MYSQL_USER
      targetPath: mysql.user
    - kind: Secret
      name: alterconso
      valuesKey: MYSQL_PASSWORD
      targetPath: mysql.password
    - kind: Secret
      name: alterconso
      valuesKey: MYSQL_ROOT_PASSWORD
      targetPath: mysql.rootPassword