apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: alterconso
  namespace: alterconso
spec:
  backend:
    repoPasswordSecretRef:
      name: s3-ovh
      key: RESTIC_PASSWORD
    s3:
      endpoint: https://s3.sbg.io.cloud.ovh.net 
      bucket: le-portail-alterconso-backups
      accessKeyIDSecretRef:
        name: s3-ovh
        key: AWS_ACCESS_KEY_ID
      secretAccessKeySecretRef:
        name: s3-ovh
        key: AWS_SECRET_ACCESS_KEY
  backup:
    # 4 fois par semaine : lundi, mardi, mercredi, jeudi à 02h00
    schedule: '0 2 * * 1,2,3,4'
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 3
  check:
    schedule: '0 3 * * 4' # vérification chaque jeudi
  prune:
    schedule: '0 4 * * 4' # nettoyage chaque jeudi selon la rétention ci-dessous
    retention:
      keepLast: 4    # toujours garder les 4 derniers (couvre la 1ère semaine)
      keepWeekly: 4  # 1 snapshot par semaine pendant 4 semaines (1 mois)
      keepMonthly: 2 # 1 snapshot par mois pendant 6 mois (~2 snapshots sur 1 an)
      keepYearly: 1  # 1 snapshot annuel