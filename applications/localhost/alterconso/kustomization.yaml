---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./secrets.enc.yaml
  - ./../../base/alterconso
patches:
  - path: ./alterconso/values.yaml
    target:
      kind: HelmRelease
      name: alterconso
  - target:
      kind: ImageUpdateAutomation
      name: alterconso
    patch: |
      - op: replace
        path: /spec/update/path
        value: ./applications/localhost