version: v2beta1
name: flux-fleet

commands:
  reconcile-source:
    description: Reconcile source flux-system
    command: |- 
      flux -n flux-system reconcile source git flux-system
      flux -n flux-system reconcile kustomization flux-system
  
  reconcile-images: 
    description: Reconcile applications-related resources
    command: |-
      flux -n alterconso reconcile image repository alterconso
      flux -n alterconso reconcile image policy alterconso
      flux -n alterconso reconcile image update alterconso

  reconcile-applications-secrets: 
    description: Reconcile applications-secrets-related resources
    command: |-
      devspace run reconcile-source
      flux -n flux-system reconcile kustomization applications-secrets
      flux -n alterconso reconcile source helm alterconso
      flux -n alterconso reconcile helmrelease alterconso

  reconcile-applications: 
    description: Reconcile applications-related resources
    command: |-
      devspace run reconcile-source
      flux -n flux-system reconcile kustomization applications
      flux -n alterconso reconcile source helm alterconso
      flux -n alterconso reconcile helmrelease alterconso

  reconcile-alterconso:
    description: Reconcile alterconso helmrelease resource
    command: |-
      flux -n alterconso reconcile helmrelease alterconso

  reconcile-all:
    description: Reconcile all types of resources
    command: |-
      devspace run reconcile-source
      flux -n flux-system reconcile kustomization infrastructure-controllers
      flux -n flux-system reconcile kustomization infrastructure-configs
      devspace run reconcile-applications
      devspace run reconcile-images

  describe-automation:
    description: Describe automation state
    command: |-
       kubectl -n alterconso describe imageupdateautomations.image.toolkit.fluxcd.io alterconso

  reconcile-artifacts:
    description: Reconcile generated artifacts
    command: |-
      kubectl -n flux-system annotate --overwrite artifactgenerators.source.extensions.fluxcd.io flux-system reconcile.fluxcd.io/requestedAt="<timestamp>"