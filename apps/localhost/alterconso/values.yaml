apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alterconso
  namespace: alterconso
spec:
  values:
    webapp:
      image:
        version: 1.0.5 # {"$imagepolicy": "alterconso:alterconso:tag"}
      ingress:
        annotations:
          cert-manager.io/cluster-issuer: "mkcert-issuer"
        hosts:
          - name: alterconso.gpenaud.localhost
            path: /
            tls: true
      vhost: alterconso.gpenaud.localhost
    database:
      env:
        MYSQL_PASSWORD: alterconso
      local:
        path: /mnt/k3s/alterconso
      nodeAffinity:
        required:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - work
  valuesFrom:
    - kind: Secret
      name: alterconso-secrets
      valuesKey: MYSQL_PASSWORD
      targetPath: webapp.env.MYSQL_PASSWORD
    - kind: Secret
      name: alterconso-secrets
      valuesKey: MYSQL_ROOT_PASSWORD
      targetPath: webapp.env.MYSQL_ROOT_PASSWORD
    - kind: Secret
      name: alterconso-secrets
      valuesKey: MYSQL_PASSWORD
      targetPath: database.env.MYSQL_PASSWORD
    - kind: Secret
      name: alterconso-secrets
      valuesKey: MYSQL_ROOT_PASSWORD
      targetPath: database.env.MYSQL_ROOT_PASSWORD